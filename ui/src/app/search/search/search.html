<mat-card class="flex flex-1 w-full">
  <mat-card-header>
    <app-search-bar (searchRequested)="onSearch($event)"></app-search-bar>
  </mat-card-header>
  <mat-card-content class="flex flex-1">
    <app-search-result [movies]="movies()" [isLoading]="isSearching()" [errorMessage]="errorMessage()"></app-search-result>
  </mat-card-content>
</mat-card>
