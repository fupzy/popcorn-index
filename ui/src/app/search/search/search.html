<mat-card class="flex flex-1 w-full min-h-0 overflow-hidden">
  <mat-card-header>
    <app-search-bar (searchRequested)="onSearch($event)"></app-search-bar>
  </mat-card-header>
  <mat-card-content class="flex flex-1 min-h-0">
    <app-search-result [results]="results()" [isLoading]="isSearching()" [errorMessage]="errorMessage()"></app-search-result>
  </mat-card-content>
</mat-card>
