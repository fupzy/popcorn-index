<mat-card class="flex flex-1 w-full min-h-0 overflow-hidden">
  <mat-card-header>
    <app-search-bar
      [initialQuery]="state.query()"
      [initialLanguage]="state.language()"
      [initialMediaType]="state.mediaType()"
      (searchRequested)="onSearch($event)"
    ></app-search-bar>
  </mat-card-header>
  <mat-card-content class="flex flex-1 min-h-0">
    <app-search-result
      [results]="state.results()"
      [isLoading]="state.isSearching()"
      [errorMessage]="state.errorMessage()"
    ></app-search-result>
  </mat-card-content>
</mat-card>
